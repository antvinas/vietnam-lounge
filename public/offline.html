<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <title>오프라인 모드</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            padding: 24px;
        }

        .box {
            max-width: 480px;
            margin: 10vh auto;
            border: 1px solid #e6eaf0;
            border-radius: 16px;
            padding: 24px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 20px;
        }

        p {
            color: #6b7380;
            font-size: 14px;
        }

        a {
            color: #0e7c86;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>오프라인입니다</h1>
        <p>네트워크 연결이 없어도 일부 페이지는 사용할 수 있어요. 연결 후 다시 시도해 주세요.</p>
        <p><a href="/">홈으로</a></p>
    </div>
</body>
</html>
